<style>
:root {
  --blue:#F97316;
  --blue-soft:#FFF3E8;
  --blue-mid:#EA6A00;
  --green:#F97316;
  --green-soft:#FFF3E8;
  --green-mid:#EA6A00;
  --red:#E85D3A;
  --red-soft:#FEF0EC;
  --bg:#F5F5F4;
  --surface:#FFFFFF;
  --border:#E7E5E4;
  --border2:#D6D3D1;
  --text1:#1C1917;
  --text2:#44403C;
  --text3:#A8A29E;
  --sun-bg:#FFF0F0;
  --sun-num:#D63030;
  --sat-bg:#EFF4FF;
  --sat-num:#3B6FD4;
  --q1:#F97316;
  --q2:#FB923C;
  --q3:#FDBA74;
  --q4:#EA6A00;
}

* { box-sizing:border-box; -webkit-tap-highlight-color:transparent; margin:0; padding:0; }

html,body {
  background:var(--bg);
  color:var(--text1);
  font-family:'Noto Sans KR', -apple-system, sans-serif;
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
}

/* ── 헤더 ── */
header {
  position:sticky; top:0; z-index:30;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:20px 10px 0;
}
.header-top {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:16px;
}
.header-title { font-size:18px; font-weight:700; color:var(--text1); }
.header-sub { font-size:12px; color:var(--text3); margin-top:2px; }
#resetBtn {
  border:none; background:var(--bg); color:var(--text2);
  font-size:12px; font-weight:500;
  padding:7px 12px; border-radius:8px; cursor:pointer;
  font-family:inherit;
  transition:background .12s;
}
#resetBtn:active { background:var(--border2); }

.progress-section { padding-bottom:16px; }
.progress-numbers {
  display:flex; justify-content:space-between; align-items:baseline;
  margin-bottom:8px;
}
.progress-label { font-size:13px; color:var(--text3); }
.progress-count { font-size:13px; font-weight:600; color:var(--text1); }
.progress-count b { font-size:22px; color:var(--blue); }
.bar {
  height:6px; border-radius:99px;
  background:var(--border);
}
.bar > span {
  display:block; height:100%; border-radius:99px;
  background:var(--blue);
  transition:width .4s cubic-bezier(.4,0,.2,1);
}

/* ── 오늘 카드 ── */
#todayWrap { padding:12px 2px 16px; }
.today-card {
  background:var(--blue);
  border-radius:16px;
  padding:18px 18px 16px;
  display:flex; align-items:center; gap:14px;
  cursor:pointer; user-select:none;
  transition:transform .1s, filter .1s;
}
.today-card:active { transform:scale(.985); filter:brightness(.95); }
.today-card.done { background:#00C471; }
.today-card.empty { cursor:default; background:var(--border2); }
.tc-badge {
  width:50px; height:50px; border-radius:14px;
  background:rgba(255,255,255,.22);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  flex-shrink:0;
}
.tc-badge-day { font-size:20px; font-weight:700; color:#fff; line-height:1; }
.tc-badge-wd { font-size:10px; color:rgba(255,255,255,.8); margin-top:2px; }
.today-card.empty .tc-badge-day { color:var(--text2); }
.today-card.empty .tc-badge-wd { color:var(--text3); }
.tc-body { flex:1; min-width:0; }
.tc-eyebrow {
  font-size:11px; font-weight:600; letter-spacing:.06em;
  color:rgba(255,255,255,.8); margin-bottom:3px;
}
.today-card.empty .tc-eyebrow { color:var(--text3); }
.tc-title { font-size:15px; font-weight:700; color:#fff; line-height:1.35; }
.today-card.done .tc-title { color:#fff; }
.today-card.empty .tc-title { color:var(--text2); }
.tc-date { font-size:11px; color:rgba(255,255,255,.7); margin-top:3px; }
.today-card.empty .tc-date { color:var(--text3); }
.tc-check {
  width:28px; height:28px; border-radius:50%;
  border:2px solid rgba(255,255,255,.5);
  background:transparent;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0; transition:all .15s;
}
.today-card.done .tc-check { background:#fff; border-color:#fff; }
.tc-check svg { opacity:0; }
.today-card.done .tc-check svg { opacity:1; }

/* ── 탭 ── */
nav.tabs {
  position:sticky; z-index:25;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:6px 12px;
  display:grid;
  grid-template-columns: repeat(6, 1fr);
  gap:5px;
}
nav.tabs button {
  font-family:inherit;
  font-size:12px; font-weight:500;
  padding:4px 4px;
  border:none; border-radius:10px;
  background:var(--bg);
  color:var(--text3);
  cursor:pointer; white-space:nowrap;
  transition:background .15s, color .15s;
  position:relative;
  display:flex; align-items:center; justify-content:center;
}
nav.tabs button.active {
  background:var(--blue); color:#fff; font-weight:700;
}
nav.tabs button .dot {
  display:block; width:5px; height:5px; border-radius:50%;
  background:var(--green);
  opacity:0; transition:opacity .15s;
  position:absolute; bottom:2px; left:50%; transform:translateX(-50%);
}
nav.tabs button.active .dot { background:rgba(255,255,255,.8); }
nav.tabs button.complete .dot { opacity:1; }

/* ── 본문 ── */
main { padding:16px 20px 100px; max-width:640px; margin:0 auto; }

.month-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:8px 0 14px;
}
.month-name { font-size:17px; font-weight:700; }
.month-stats { font-size:13px; color:var(--text3); font-weight:500; }
.month-stats b { color:var(--text1); font-weight:700; }

/* ── 일별 행 ── */
.day-row {
  display:flex; align-items:center; gap:14px;
  padding:12px 14px;
  border-radius:14px;
  cursor:pointer; user-select:none;
  margin-bottom:4px;
  background:var(--surface);
  border:1px solid #E0DDDB;
  transition:background .1s;
}
.day-row:active { background:var(--bg); }

/* 일/토 배경 */
.day-row.sunday { background:var(--sun-bg); border:1px solid #F5B8B8; }
.day-row.saturday { background:var(--sat-bg); border:1px solid #B8CFEF; }
.day-row.sunday:active { background:#fcd8d8; }
.day-row.saturday:active { background:#dce8ff; }

.day-num {
  flex:0 0 36px; height:36px; border-radius:10px;
  background:var(--bg);
  display:flex; align-items:center; justify-content:center;
  font-size:14px; font-weight:700; color:var(--text2);
  transition:all .15s;
}
.day-row.sunday .day-num { background:rgba(214,48,48,.1); color:var(--sun-num); }
.day-row.saturday .day-num { background:rgba(59,111,212,.12); color:var(--sat-num); }

.day-body { flex:1; min-width:0; }
.day-text { font-size:14px; font-weight:500; color:var(--text1); line-height:1.4; }
.day-tag {
  display:inline-flex; align-items:center; gap:4px;
  font-size:11px; font-weight:600; color:var(--blue);
  background:var(--blue-soft);
  border-radius:6px; padding:3px 8px;
  text-decoration:none;
  transition:background .1s;
  white-space:nowrap;
}
.day-tag:active { background:#d6e8fd; }
.play-icon { width:10px; height:10px; }

.check {
  flex:0 0 22px; height:22px; border-radius:6px;
  border:1.5px solid var(--border2);
  background:transparent;
  display:flex; align-items:center; justify-content:center;
  transition:all .15s;
}
.check-stamp {
  font-size:11px; color:rgba(255,255,255,.8);
  font-weight:500; white-space:nowrap; flex-shrink:0;
}
.check svg { opacity:0; transition:opacity .12s; }

/* 완료 상태 */
.day-row.done { background:#00C471; border-color:#00A85E; }
.day-row.done .day-num { background:#00C471; color:#fff; border:1.5px solid rgba(255,255,255,.7); }
.day-row.done.sunday .day-num { background:rgba(214,48,48,.1); color:var(--sun-num); border:1.5px solid rgba(255,255,255,.7); }
.day-row.done.saturday .day-num { background:rgba(59,111,212,.12); color:var(--sat-num); border:1.5px solid rgba(255,255,255,.7); }
.day-row.done .day-text { color:rgba(255,255,255,.8); }
.day-row.done .check { background:#00C471; border-color:#fff; }
.day-row.done .check svg { opacity:1; }
.day-row.done .day-tag { opacity:.5; }

/* 오늘 */
.day-row.today { background:var(--blue-soft); border-color:#B8CFEF; }
.day-row.today:active { background:#daeafe; }
.day-row.today .day-num { background:var(--blue); color:#fff; position:relative; }
.day-row.today .day-num::after {
  content:"오늘";
  position:absolute; top:-11px; left:50%; transform:translateX(-50%);
  font-size:9px; font-weight:700; color:#fff;
  background:var(--blue); border-radius:99px; padding:1px 5px;
  white-space:nowrap;
}

/* 오늘 + 완료 */
.day-row.today.done { background:#00C471; border-color:#00A85E; }
.day-row.today.done .day-num { background:var(--blue); color:#fff; border:1.5px solid rgba(255,255,255,.7); }
.day-row.today.done .day-text { color:rgba(255,255,255,.9); }
.day-row.today.done .check { background:#00C471; border-color:#fff; }

/* 휴일 */
.day-row.note { cursor:default; background:transparent; }
.day-row.note:active { background:transparent; }
.day-row.note .day-num { background:transparent; border:1.5px dashed var(--border2); color:var(--text3); }
.day-row.note .day-text { color:var(--text3); font-style:italic; }
.day-row.note .check { visibility:hidden; }

/* 섹션 구분선 */
.section-divider {
  height:1px; background:var(--border);
  margin:8px 0 12px;
}

footer {
  text-align:center; font-size:12px; color:var(--text3);
  padding:20px 20px 40px; line-height:1.8;
}
.video-accent { color:var(--blue); font-weight:600; }
</style>

const STORAGE_KEY = "bible2026_checks";
let checks = {};
try { checks = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch(e){ checks = {}; }
function saveChecks(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(checks)); }

const WDAYS = ["일","월","화","수","목","금","토"];
const now = new Date();
const todayMonth = now.getMonth()+1;
const todayDay = now.getDate();
let activeMonth = (todayMonth >= 1 && todayMonth <= 12) ? (todayMonth-1) : 0;

const CHECK_SVG_GREEN = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 12 9 18 20 6"/></svg>`;
const PLAY_SVG = `<svg width="14" height="10" viewBox="0 0 24 17" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="24" height="17" rx="4" fill="#FF0000"/><polygon points="9.5,4.5 9.5,12.5 17,8.5" fill="#fff"/></svg>`;

/* ── 성경 약어 → 전체 이름 ── */
const BIBLE_ABBR = {
  "창":"창세기","출":"출애굽기","레":"레위기","민":"민수기","신":"신명기",
  "수":"여호수아","삿":"사사기","룻":"룻기",
  "삼상":"사무엘상","삼하":"사무엘하",
  "왕상":"열왕기상","왕하":"열왕기하",
  "대상":"역대상","대하":"역대하",
  "스":"에스라","느":"느헤미야","에":"에스더",
  "욥":"욥기","시":"시편","잠":"잠언","전":"전도서","아":"아가",
  "사":"이사야","렘":"예레미야","애":"예레미야애가","겔":"에스겔","단":"다니엘",
  "호":"호세아","욜":"요엘","암":"아모스","옵":"오바댜","욘":"요나",
  "미":"미가","나":"나훔","합":"하박국","습":"스바냐","학":"학개",
  "슥":"스가랴","말":"말라기",
  "마":"마태복음","막":"마가복음","눅":"누가복음","요":"요한복음",
  "행":"사도행전","롬":"로마서",
  "고전":"고린도전서","고후":"고린도후서",
  "갈":"갈라디아서","엡":"에베소서","빌":"빌립보서","골":"골로새서",
  "살전":"데살로니가전서","살후":"데살로니가후서",
  "딤전":"디모데전서","딤후":"디모데후서",
  "딛":"디도서","몬":"빌레몬서","히":"히브리서",
  "약":"야고보서","벧전":"베드로전서","벧후":"베드로후서",
  "요일":"요한일서","요이":"요한이서","요삼":"요한삼서",
  "유":"유다서","계":"요한계시록"
};

function expandBible(text) {
  /* "창 1~4" → "창세기 1~4", "딛~몬" → "디도서~빌레몬서" 등 처리 */
  return text.replace(/([가-힣]+)/g, (match) => BIBLE_ABBR[match] || match);
}

const tabsEl = document.getElementById('tabs');
const contentEl = document.getElementById('content');

function checkableEntries(mi){ return MONTHS[mi].days.filter(d => d[3] !== "note"); }
function isDone(mi, day){ return !!checks[mi+"-"+day]; }
function monthStats(mi){
  const e = checkableEntries(mi);
  return { done: e.filter(x => isDone(mi, x[0])).length, total: e.length };
}

function renderTabs(){
  tabsEl.innerHTML = "";
  MONTHS.forEach((m, idx) => {
    const btn = document.createElement('button');
    const s = monthStats(idx);
    const isComplete = s.done === s.total && s.total > 0;
    btn.className = (idx === activeMonth ? "active" : "") + (isComplete ? " complete" : "");
    btn.innerHTML = m.name + '<span class="dot"></span>';
    btn.addEventListener('click', () => { activeMonth = idx; renderAll(); });
    tabsEl.appendChild(btn);
  });
}

function renderMonth(){
  contentEl.innerHTML = "";
  const m = MONTHS[activeMonth];
  const s = monthStats(activeMonth);

  const head = document.createElement('div');
  head.className = "month-header";
  head.innerHTML = `<span class="month-name">${m.name}</span><span class="month-stats"><b>${s.done}</b> / ${s.total}일 완료</span>`;
  contentEl.appendChild(head);

  if (m.days.length === 0){
    const p = document.createElement('div');
    p.style.cssText = "padding:20px 0;font-size:14px;color:var(--text3);";
    p.textContent = "이 달은 별도의 읽기 일정이 없습니다.";
    contentEl.appendChild(p);
    return;
  }

  m.days.forEach(([day, text, videoKey, flag]) => {
    const done = isDone(activeMonth, day);
    const isToday = (activeMonth+1 === todayMonth) && (day === todayDay);
    const dow = new Date(2026, activeMonth, day).getDay();
    const weekClass = dow === 0 ? " sunday" : dow === 6 ? " saturday" : "";

    const row = document.createElement('div');
    row.className = "day-row" + (done?" done":"") + (isToday?" today":"") + (flag==="note"?" note":"") + weekClass;

    const num = document.createElement('div');
    num.className = "day-num";
    num.textContent = day;

    const body = document.createElement('div');
    body.className = "day-body";

    if (videoKey && V[videoKey]){
      const wrap = document.createElement('div');
      wrap.style.cssText = "display:flex;align-items:center;gap:6px;flex-wrap:wrap;";
      const txt = document.createElement('span');
      txt.className = "day-text";
      txt.textContent = expandBible(text);
      const a = document.createElement('a');
      a.className = "day-tag";
      a.href = V[videoKey];
      a.target = "_blank"; a.rel = "noopener";
      a.innerHTML = PLAY_SVG + " 영상";
      a.addEventListener('click', e => e.stopPropagation());
      wrap.appendChild(txt);
      wrap.appendChild(a);
      body.appendChild(wrap);
    } else {
      const txt = document.createElement('div');
      txt.className = "day-text";
      txt.textContent = expandBible(text);
      body.appendChild(txt);
    }

    const chk = document.createElement('div');
    chk.className = "check";
    chk.innerHTML = CHECK_SVG_GREEN;

    row.appendChild(num);
    row.appendChild(body);

    if (done && typeof checks[activeMonth+"-"+day] === "string") {
      const stamp = document.createElement('div');
      stamp.className = "check-stamp";
      stamp.textContent = checks[activeMonth+"-"+day];
      row.appendChild(stamp);
    }

    row.appendChild(chk);

    if (flag !== "note"){
      row.addEventListener('click', () => {
        const key = activeMonth+"-"+day;
        if (checks[key]) {
          delete checks[key];
        } else {
          const now2 = new Date();
          checks[key] = `${now2.getMonth()+1}/${now2.getDate()} ${String(now2.getHours()).padStart(2,'0')}:${String(now2.getMinutes()).padStart(2,'0')}`;
        }
        saveChecks(); renderAll();
      });
    }
    contentEl.appendChild(row);
  });
}

function renderTotals(){
  let done=0, total=0;
  MONTHS.forEach((m,i) => { const s=monthStats(i); done+=s.done; total+=s.total; });
  document.getElementById('totalDone').textContent = done;
  document.getElementById('totalCount').textContent = total;
  document.getElementById('totalBar').style.width = (total ? done/total*100 : 0)+"%";
}

function renderTodayCard(){
  const wrap = document.getElementById('todayWrap');
  if (todayMonth < 1 || todayMonth > 12){ wrap.innerHTML=""; return; }
  const mi = todayMonth-1;
  const entry = MONTHS[mi].days.find(d => d[0]===todayDay);
  const wd = WDAYS[now.getDay()];
  const dateStr = `${todayMonth}월 ${todayDay}일 (${wd})`;

  if (!entry){
    wrap.innerHTML = `
      <div>
        <div class="today-card empty">
          <div class="tc-badge"><div class="tc-badge-day" style="color:var(--text2)">${todayDay}</div><div class="tc-badge-wd" style="color:var(--text3)">${wd}</div></div>
          <div class="tc-body">
            <div class="tc-eyebrow" style="color:var(--text3)">오늘의 말씀</div>
            <div class="tc-title" style="color:var(--text2);font-weight:500">오늘은 읽기 일정이 없어요</div>
            <div class="tc-date" style="color:var(--text3)">${dateStr}</div>
          </div>
        </div>
      </div>`;
    return;
  }

  const [day, text, videoKey, flag] = entry;
  const done = isDone(mi, day);
  const isNote = flag==="note";

  wrap.innerHTML = `
    <div>
      <div class="today-card ${done?'done':''} ${isNote?'empty':''}" id="todayCardInner">
        <div class="tc-badge">
          <div class="tc-badge-day">${day}</div>
          <div class="tc-badge-wd">${wd}</div>
        </div>
        <div class="tc-body">
          <div class="tc-eyebrow">오늘의 말씀</div>
          <div class="tc-title">${expandBible(text)}</div>
          <div class="tc-date">${dateStr}</div>
        </div>
        ${isNote ? '' : `<div class="tc-check"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="${done?'#00C471':'#fff'}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 12 9 18 20 6"/></svg></div>`}
      </div>
    </div>`;

  if (!isNote){
    document.getElementById('todayCardInner').addEventListener('click', () => {
      const key = mi+"-"+day;
      if (checks[key]) {
        delete checks[key];
      } else {
        const now2 = new Date();
        checks[key] = `${now2.getMonth()+1}/${now2.getDate()} ${String(now2.getHours()).padStart(2,'0')}:${String(now2.getMinutes()).padStart(2,'0')}`;
      }
      saveChecks(); renderAll();
    });
  }
}

function syncTabsTop(){
  const h = document.querySelector('header');
  tabsEl.style.top = h.offsetHeight+'px';
}
window.addEventListener('resize', syncTabsTop);

function renderAll(){
  renderTabs();
  renderMonth();
  renderTotals();
  renderTodayCard();
  syncTabsTop();
}

document.getElementById('resetBtn').addEventListener('click', () => {
  if (confirm("모든 체크를 초기화할까요?\n이 작업은 되돌릴 수 없습니다.")){
    checks = {}; saveChecks(); renderAll();
  }
});

renderAll();
</script>
