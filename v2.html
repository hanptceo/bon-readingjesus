<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>성경읽기 통독표</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --blue:#F97316;
  --blue-soft:#FFF3E8;
  --blue-mid:#EA6A00;
  --green:#F97316;
  --green-soft:#FFF3E8;
  --green-mid:#EA6A00;
  --red:#E85D3A;
  --red-soft:#FEF0EC;
  --bg:#F5F5F4;
  --surface:#FFFFFF;
  --border:#E7E5E4;
  --border2:#D6D3D1;
  --text1:#1C1917;
  --text2:#44403C;
  --text3:#A8A29E;
  --sun-bg:#FFF0F0;
  --sun-num:#D63030;
  --sat-bg:#EFF4FF;
  --sat-num:#3B6FD4;
}
* { box-sizing:border-box; -webkit-tap-highlight-color:transparent; margin:0; padding:0; }
html,body {
  background:var(--bg); color:var(--text1);
  font-family:'Noto Sans KR',-apple-system,sans-serif;
  -webkit-font-smoothing:antialiased; min-height:100vh;
}

/* ── 시작일 설정 오버레이 ── */
#setupOverlay {
  position:fixed; inset:0; z-index:100;
  background:rgba(28,25,23,.6); backdrop-filter:blur(4px);
  display:flex; align-items:center; justify-content:center; padding:24px;
}
.setup-card {
  background:var(--surface); border-radius:20px;
  padding:28px 24px; width:100%; max-width:340px;
  box-shadow:0 20px 60px rgba(0,0,0,.2);
}
.setup-title { font-size:18px; font-weight:700; color:var(--text1); margin-bottom:6px; }
.setup-sub { font-size:13px; color:var(--text3); line-height:1.6; margin-bottom:24px; }
.setup-label { font-size:12px; font-weight:600; color:var(--text2); margin-bottom:8px; display:block; }
.setup-input {
  width:100%; border:1.5px solid var(--border2); border-radius:12px;
  padding:12px 14px; font-size:15px; font-family:inherit; color:var(--text1);
  background:var(--bg); outline:none; margin-bottom:20px;
  transition:border-color .15s;
}
.setup-input:focus { border-color:var(--blue); }
.setup-btn {
  width:100%; background:var(--blue); color:#fff;
  border:none; border-radius:12px; padding:14px;
  font-size:15px; font-weight:700; font-family:inherit;
  cursor:pointer; transition:filter .12s;
}
.setup-btn:active { filter:brightness(.93); }
.setup-cancel {
  width:100%; background:transparent; color:var(--text3);
  border:none; border-radius:12px; padding:10px;
  font-size:14px; font-weight:500; font-family:inherit;
  cursor:pointer; margin-top:6px; transition:color .12s;
}
.setup-cancel:active { color:var(--text2); }
.setup-hint { font-size:11px; color:var(--text3); text-align:center; margin-top:12px; line-height:1.6; }

/* ── 헤더 ── */
header {
  position:sticky; top:0; z-index:30;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:20px 10px 0;
}
.header-top {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:16px;
}
.header-title { font-size:18px; font-weight:700; color:var(--text1); }
.header-sub { font-size:12px; color:var(--text3); margin-top:2px; }
.header-btns { display:flex; gap:6px; }
#resetBtn, #startBtn {
  border:none; background:var(--bg); color:var(--text2);
  font-size:12px; font-weight:500;
  padding:7px 10px; border-radius:8px; cursor:pointer;
  font-family:inherit; transition:background .12s;
}
#startBtn { color:var(--blue); }
#resetBtn:active, #startBtn:active { background:var(--border2); }

.progress-section { padding-bottom:16px; }
.progress-numbers {
  display:flex; justify-content:space-between; align-items:baseline;
  margin-bottom:8px;
}
.progress-label { font-size:13px; color:var(--text3); }
.progress-count { font-size:13px; font-weight:600; color:var(--text1); }
.progress-count b { font-size:22px; color:var(--blue); }
.bar { height:6px; border-radius:99px; background:var(--border); }
.bar > span {
  display:block; height:100%; border-radius:99px;
  background:var(--blue); transition:width .4s cubic-bezier(.4,0,.2,1);
}

/* ── 오늘 카드 ── */
#todayWrap { padding:12px 2px 16px; }
.today-card {
  background:var(--blue); border-radius:16px;
  padding:18px 18px 16px;
  display:flex; align-items:center; gap:14px;
  cursor:pointer; user-select:none;
  transition:transform .1s, filter .1s;
}
.today-card:active { transform:scale(.985); filter:brightness(.95); }
.today-card.done { background:#00C471; }
.today-card.empty { cursor:default; background:var(--border2); }
.tc-badge {
  width:50px; height:50px; border-radius:14px;
  background:rgba(255,255,255,.22);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  flex-shrink:0;
}
.tc-badge-day { font-size:20px; font-weight:700; color:#fff; line-height:1; }
.tc-badge-wd { font-size:10px; color:rgba(255,255,255,.8); margin-top:2px; }
.today-card.empty .tc-badge-day { color:var(--text2); }
.today-card.empty .tc-badge-wd { color:var(--text3); }
.tc-body { flex:1; min-width:0; }
.tc-eyebrow { font-size:11px; font-weight:600; letter-spacing:.06em; color:rgba(255,255,255,.8); margin-bottom:3px; }
.today-card.empty .tc-eyebrow { color:var(--text3); }
.tc-title { font-size:16px; font-weight:700; color:#fff; line-height:1.35; }
.today-card.empty .tc-title { color:var(--text2); font-weight:500; }
.tc-date { font-size:11px; color:rgba(255,255,255,.7); margin-top:3px; }
.today-card.empty .tc-date { color:var(--text3); }
.tc-check {
  width:28px; height:28px; border-radius:50%;
  border:2px solid rgba(255,255,255,.5); background:transparent;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0; transition:all .15s;
}
.today-card.done .tc-check { background:#fff; border-color:#fff; }
.tc-check svg { opacity:0; }
.today-card.done .tc-check svg { opacity:1; }

/* ── 탭 ── */
nav.tabs {
  position:sticky; z-index:25;
  background:var(--surface); border-bottom:1px solid var(--border);
  padding:6px 12px;
  display:grid; grid-template-columns:repeat(6,1fr); gap:5px;
}
nav.tabs button {
  font-family:inherit; font-size:12px; font-weight:500;
  padding:4px 4px; border:none; border-radius:10px;
  background:var(--bg); color:var(--text3);
  cursor:pointer; white-space:nowrap;
  transition:background .15s, color .15s;
  position:relative; display:flex; align-items:center; justify-content:center;
}
nav.tabs button.active { background:var(--blue); color:#fff; font-weight:700; }
nav.tabs button .dot {
  display:block; width:5px; height:5px; border-radius:50%;
  background:var(--green); opacity:0; transition:opacity .15s;
  position:absolute; bottom:2px; left:50%; transform:translateX(-50%);
}
nav.tabs button.active .dot { background:rgba(255,255,255,.8); }
nav.tabs button.complete .dot { opacity:1; }

/* ── 본문 ── */
main { padding:16px 20px 100px; max-width:640px; margin:0 auto; }
.month-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:8px 0 14px;
}
.month-name { font-size:17px; font-weight:700; }
.month-stats { font-size:13px; color:var(--text3); font-weight:500; }
.month-stats b { color:var(--text1); font-weight:700; }

/* ── 일별 행 ── */
.day-row {
  display:flex; align-items:center; gap:11px;
  padding:10px 14px; border-radius:14px;
  cursor:pointer; user-select:none; margin-bottom:4px;
  background:var(--surface); border:1px solid #E0DDDB;
  transition:background .1s;
}
.day-row:active { background:var(--bg); }
.day-row.sunday { background:var(--sun-bg); border:1px solid #F5B8B8; }
.day-row.saturday { background:var(--sat-bg); border:1px solid #B8CFEF; }
.day-row.sunday:active { background:#fcd8d8; }
.day-row.saturday:active { background:#dce8ff; }

.day-num {
  flex:0 0 29px; height:29px; border-radius:8px;
  background:var(--bg);
  display:flex; align-items:center; justify-content:center;
  font-size:15px; font-weight:700; color:var(--text2);
  transition:all .15s;
}
.day-row.sunday .day-num { background:rgba(214,48,48,.1); color:var(--sun-num); }
.day-row.saturday .day-num { background:rgba(59,111,212,.12); color:var(--sat-num); }

.day-body { flex:1; min-width:0; }
.day-text { font-size:15px; font-weight:500; color:var(--text1); line-height:1.4; }
.day-tag {
  display:inline-flex; align-items:center; gap:4px;
  font-size:12px; font-weight:600; color:var(--blue);
  background:var(--blue-soft); border-radius:6px; padding:3px 8px;
  text-decoration:none; transition:background .1s; white-space:nowrap;
}
.check {
  flex:0 0 18px; height:18px; border-radius:4px;
  border:1.5px solid var(--border2); background:transparent;
  display:flex; align-items:center; justify-content:center; transition:all .15s;
}
.check-stamp {
  font-size:12px; color:rgba(255,255,255,.8);
  font-weight:500; white-space:nowrap; flex-shrink:0;
}
.check svg { opacity:0; transition:opacity .12s; }

/* 완료 */
.day-row.done { background:#00C471; border-color:#00A85E; }
.day-row.done .day-num { background:#00C471; color:#fff; border:1.5px solid rgba(255,255,255,.7); }
.day-row.done.sunday .day-num { background:rgba(214,48,48,.1); color:var(--sun-num); border:1.5px solid rgba(255,255,255,.7); }
.day-row.done.saturday .day-num { background:rgba(59,111,212,.12); color:var(--sat-num); border:1.5px solid rgba(255,255,255,.7); }
.day-row.done .day-text { color:rgba(255,255,255,.8); }
.day-row.done .check { background:#00C471; border-color:#fff; }
.day-row.done .check svg { opacity:1; }
.day-row.done .day-tag { opacity:.5; }

/* 오늘 */
.day-row.today { background:var(--blue-soft); border-color:#B8CFEF; }
.day-row.today:active { background:#daeafe; }
.day-row.today .day-num { background:var(--blue); color:#fff; position:relative; }
.day-row.today .day-num::after {
  content:"오늘"; position:absolute; top:-11px; left:50%; transform:translateX(-50%);
  font-size:10px; font-weight:700; color:#fff;
  background:var(--blue); border-radius:99px; padding:1px 5px; white-space:nowrap;
}
.day-row.today.done { background:#00C471; border-color:#00A85E; }
.day-row.today.done .day-num { background:var(--blue); color:#fff; border:1.5px solid rgba(255,255,255,.7); }
.day-row.today.done .day-text { color:rgba(255,255,255,.9); }
.day-row.today.done .check { background:#00C471; border-color:#fff; }

/* 휴일 */
.day-row.note { cursor:default; background:transparent; border-color:transparent; }
.day-row.note .day-num { background:transparent; border:1.5px dashed var(--border2); color:var(--text3); }
.day-row.note .day-text { color:var(--text3); font-style:italic; }
.day-row.note .check { visibility:hidden; }

footer {
  text-align:center; font-size:12px; color:var(--text3);
  padding:20px 20px 40px; line-height:1.8;
}
</style>
</head>

  "삼상":"사무엘상","삼하":"사무엘하","왕상":"열왕기상","왕하":"열왕기하",
  "대상":"역대상","대하":"역대하","스":"에스라","느":"느헤미야","에":"에스더",
  "욥":"욥기","시":"시편","잠":"잠언","전":"전도서","아":"아가",
  "사":"이사야","렘":"예레미야","애":"예레미야애가","겔":"에스겔","단":"다니엘",
  "호":"호세아","욜":"요엘","암":"아모스","옵":"오바댜","욘":"요나",
  "미":"미가","나":"나훔","합":"하박국","습":"스바냐","학":"학개",
  "슥":"스가랴","말":"말라기","마":"마태복음","막":"마가복음","눅":"누가복음","요":"요한복음",
  "행":"사도행전","롬":"로마서","고전":"고린도전서","고후":"고린도후서",
  "갈":"갈라디아서","엡":"에베소서","빌":"빌립보서","골":"골로새서",
  "살전":"데살로니가전서","살후":"데살로니가후서","딤전":"디모데전서","딤후":"디모데후서",
  "딛":"디도서","몬":"빌레몬서","히":"히브리서","약":"야고보서",

  "유":"유다서","계":"요한계시록"

function expandBible(t){ return t.replace(/([가-힣]+)/g, m => BIBLE_ABBR[m]||m); }

const WDAYS = ["일","월","화","수","목","금","토"];
const STORAGE_KEY = "bibleReading_flex";
const now = new Date();

/* ── 저장된 데이터 로드 ── */
let store = {};
try { store = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch(e){ store = {}; }
function save(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(store)); }

/* ── 시작일로부터 날짜별 일정 생성 ── */
let SCHEDULE = []; // [{date, text, videoKey}, ...]
let MONTHS_DATA = []; // 월별 그룹
let activeMonthIdx = 0;

function buildSchedule(startDateStr){
  SCHEDULE = [];
  const start = new Date(startDateStr + "T00:00:00");
  let cur = new Date(start);
  READ_LIST.forEach(item => {
    const [text, videoKey] = item;
    SCHEDULE.push({
      date: new Date(cur),
      text, videoKey: videoKey || null
    });
    cur.setDate(cur.getDate() + 1);
  });

  // 월별 그룹핑
  const map = {};
  SCHEDULE.forEach((s, idx) => {
    const y = s.date.getFullYear();
    const m = s.date.getMonth();
    const key = `${y}-${m}`;
    if (!map[key]) map[key] = { year:y, month:m, entries:[] };
    map[key].entries.push({ ...s, idx });
  });
  MONTHS_DATA = Object.values(map);
  store.monthKeys = MONTHS_DATA.map(m => `${m.year}-${m.month}`);
}

function dateKey(date){ return `${date.getFullYear()}-${date.getMonth()}-${date.getDate()}`; }
function isDone(date){ return !!store.checks?.[dateKey(date)]; }
function getStamp(date){ return store.checks?.[dateKey(date)]; }

function setDone(date){
  if (!store.checks) store.checks = {};
  const k = dateKey(date);
  if (store.checks[k]) { delete store.checks[k]; }
  else {
    const n = new Date();
    store.checks[k] = `${n.getMonth()+1}/${n.getDate()} ${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;
  }
  save();
}

/* ── 렌더 ── */
const tabsEl = document.getElementById('tabs');
const contentEl = document.getElementById('content');
const CHECK_SVG = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 12 9 18 20 6"/></svg>`;
const PLAY_SVG = `<svg width="14" height="10" viewBox="0 0 24 17" fill="none"><rect width="24" height="17" rx="4" fill="#FF0000"/><polygon points="9.5,4.5 9.5,12.5 17,8.5" fill="#fff"/></svg>`;

function monthLabel(m){ return `${m.month+1}월`; }
function monthDoneTotal(m){
  let done=0; m.entries.forEach(e=>{ if(isDone(e.date)) done++; });
  return { done, total: m.entries.length };
}

function renderTabs(){
  tabsEl.innerHTML = "";
  MONTHS_DATA.forEach((m, idx) => {
    const btn = document.createElement('button');
    const {done,total} = monthDoneTotal(m);
    const isComplete = done===total && total>0;
    btn.className = (idx===activeMonthIdx?"active":"") + (isComplete?" complete":"");
    btn.innerHTML = monthLabel(m) + '<span class="dot"></span>';
    btn.addEventListener('click', ()=>{ activeMonthIdx=idx; renderAll(); });
    tabsEl.appendChild(btn);
  });
}

function renderMonth(){
  contentEl.innerHTML = "";
  if (!MONTHS_DATA.length) return;
  const m = MONTHS_DATA[activeMonthIdx];
  const {done,total} = monthDoneTotal(m);

  const head = document.createElement('div');
  head.className = "month-header";
  head.innerHTML = `<span class="month-name">${m.year}년 ${monthLabel(m)}</span><span class="month-stats"><b>${done}</b> / ${total}일 완료</span>`;
  contentEl.appendChild(head);

  m.entries.forEach(entry => {
    const {date, text, videoKey} = entry;
    const d = isDone(date);
    const day = date.getDate();
    const dow = date.getDay();
    const isToday = date.toDateString() === now.toDateString();
    const weekClass = dow===0?" sunday":dow===6?" saturday":"";

    const row = document.createElement('div');
    row.className = "day-row"+(d?" done":"")+(isToday?" today":"")+weekClass;

    const num = document.createElement('div');
    num.className = "day-num";
    num.textContent = day;

    const body = document.createElement('div');
    body.className = "day-body";

    if (videoKey && V[videoKey]){
      const wrap = document.createElement('div');
      wrap.style.cssText = "display:flex;align-items:center;gap:6px;flex-wrap:wrap;";
      const txt = document.createElement('span');
      txt.className = "day-text";
      txt.textContent = expandBible(text);
      const a = document.createElement('a');
      a.className = "day-tag"; a.href=V[videoKey]; a.target="_blank"; a.rel="noopener";
      a.innerHTML = PLAY_SVG+" 영상";
      a.addEventListener('click', e=>e.stopPropagation());
      wrap.appendChild(txt); wrap.appendChild(a);
      body.appendChild(wrap);
    } else {
      const txt = document.createElement('div');
      txt.className = "day-text"; txt.textContent = expandBible(text);
      body.appendChild(txt);
    }

    const chk = document.createElement('div');
    chk.className = "check"; chk.innerHTML = CHECK_SVG;

    row.appendChild(num); row.appendChild(body);

    if (d && typeof getStamp(date)==="string"){
      const stamp = document.createElement('div');
      stamp.className = "check-stamp";
      stamp.textContent = getStamp(date);
      row.appendChild(stamp);
    }
    row.appendChild(chk);

    row.addEventListener('click', ()=>{ setDone(date); renderAll(); });
    contentEl.appendChild(row);
  });
}

function renderTotals(){
  const total = SCHEDULE.length;
  const done = SCHEDULE.filter(s=>isDone(s.date)).length;
  document.getElementById('totalDone').textContent = done;
  document.getElementById('totalCount').textContent = total;
  document.getElementById('totalBar').style.width = (total ? done/total*100 : 0)+"%";
}

function renderTodayCard(){
  const wrap = document.getElementById('todayWrap');
  const entry = SCHEDULE.find(s => s.date.toDateString()===now.toDateString());
  const wd = WDAYS[now.getDay()];
  const dateStr = `${now.getMonth()+1}월 ${now.getDate()}일 (${wd})`;

  if (!entry){
    wrap.innerHTML = `<div><div class="today-card empty">
      <div class="tc-badge"><div class="tc-badge-day" style="color:var(--text2)">${now.getDate()}</div><div class="tc-badge-wd" style="color:var(--text3)">${wd}</div></div>
      <div class="tc-body">
        <div class="tc-eyebrow" style="color:var(--text3)">오늘의 말씀</div>
        <div class="tc-title" style="color:var(--text2);font-weight:500">오늘은 읽기 일정이 없어요</div>
        <div class="tc-date" style="color:var(--text3)">${dateStr}</div>
      </div></div></div>`;
    return;
  }
  const done = isDone(entry.date);
  wrap.innerHTML = `<div><div class="today-card ${done?'done':''}" id="todayCardInner">
    <div class="tc-badge"><div class="tc-badge-day">${now.getDate()}</div><div class="tc-badge-wd">${wd}</div></div>
    <div class="tc-body">
      <div class="tc-eyebrow">오늘의 말씀</div>
      <div class="tc-title">${expandBible(entry.text)}</div>
      <div class="tc-date">${dateStr}</div>
    </div>
    <div class="tc-check"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="${done?'#00C471':'#fff'}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 12 9 18 20 6"/></svg></div>
  </div></div>`;
  document.getElementById('todayCardInner').addEventListener('click', ()=>{ setDone(entry.date); renderAll(); });
}

function syncTabsTop(){
  tabsEl.style.top = document.querySelector('header').offsetHeight+'px';
}
window.addEventListener('resize', syncTabsTop);

function renderAll(){
  if (!MONTHS_DATA.length) return;
  renderTabs(); renderMonth(); renderTotals(); renderTodayCard(); syncTabsTop();
}

/* ── 시작일 설정 UI ── */
const overlay = document.getElementById('setupOverlay');
const startInput = document.getElementById('startDateInput');

// 기본값: 오늘
startInput.value = now.toISOString().slice(0,10);

function initFromStore(){
  if (store.startDate){
    const hadMonthKeys = Array.isArray(store.monthKeys) && store.monthKeys.length > 0;
    buildSchedule(store.startDate);
    if (!hadMonthKeys) save();
    const todayMi = MONTHS_DATA.findIndex(m =>
      m.entries.some(e => e.date.toDateString()===now.toDateString())
    );
    activeMonthIdx = todayMi >= 0 ? todayMi : 0;
    overlay.style.display = 'none';
    document.getElementById('headerSub').textContent =
      `${store.startDate} 시작 · 그리스도 중심 · 본교회`;
    renderAll();
  } else {
    document.getElementById('setupCancel').style.display = 'none';
  }
}

document.getElementById('startBtn').addEventListener('click', ()=>{
  if (store.startDate) startInput.value = store.startDate;
  document.getElementById('setupCancel').style.display = 'block';
  overlay.style.display = 'flex';
});

document.getElementById('setupConfirm').addEventListener('click', ()=>{
  const val = startInput.value;
  if (!val){ alert('날짜를 선택해 주세요.'); return; }
  store.startDate = val;
  store.checks = store.checks || {};
  buildSchedule(val);
  save();
  activeMonthIdx = 0;
  overlay.style.display = 'none';
  document.getElementById('headerSub').textContent = `${val} 시작 · 그리스도 중심 · 본교회`;
  renderAll();
});

document.getElementById('resetBtn').addEventListener('click', ()=>{
  if (confirm("모든 체크와 시작일을 초기화할까요?\n이 작업은 되돌릴 수 없습니다.")){
    store = {}; save();
    MONTHS_DATA = []; SCHEDULE = [];
    document.getElementById('setupCancel').style.display = 'none';
    overlay.style.display = 'flex';
    startInput.value = now.toISOString().slice(0,10);
  }
});

document.getElementById('setupCancel').addEventListener('click', ()=>{
  if (store.startDate){
    overlay.style.display = 'none';
  }
});

initFromStore();
</script>
